<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Black Background -->
  <circle cx="250" cy="250" r="250" fill="#000000"/>
  
  <!-- Outer Gold Circle Border -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="#FFD700" stroke-width="4"/>
  <circle cx="250" cy="250" r="230" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Inner decorative circles -->
  <circle cx="250" cy="250" r="210" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  
  <!-- Microphone on right -->
  <g transform="translate(380, 120)">
    <!-- Microphone body -->
    <path d="M 0 20 Q -15 20 -15 0 Q -15 -20 0 -20 Q 15 -20 15 0 Q 15 20 0 20" fill="#FFD700" stroke="#FFD700" stroke-width="1"/>
    <!-- Microphone grille lines -->
    <line x1="-10" y1="-15" x2="-10" y2="15" stroke="#000000" stroke-width="1.5"/>
    <line x1="-5" y1="-18" x2="-5" y2="18" stroke="#000000" stroke-width="1.5"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#000000" stroke-width="1.5"/>
    <line x1="5" y1="-18" x2="5" y2="18" stroke="#000000" stroke-width="1.5"/>
    <line x1="10" y1="-15" x2="10" y2="15" stroke="#000000" stroke-width="1.5"/>
    <!-- Microphone stand -->
    <rect x="-3" y="20" width="6" height="30" fill="#FFD700"/>
    <!-- Sound waves -->
    <path d="M 30 -10 Q 35 -15 40 -10" stroke="#FFD700" stroke-width="2" fill="none"/>
    <path d="M 30 0 Q 35 -5 40 0" stroke="#FFD700" stroke-width="2" fill="none"/>
    <path d="M 30 10 Q 35 5 40 10" stroke="#FFD700" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Main Text -->
  <g transform="translate(250, 200)">
    <!-- AMA (white) -->
    <text x="0" y="0" font-family="'Playfair Display', serif" font-size="80" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">
      AMA
    </text>
    <!-- WACHA TU (gold) -->
    <text x="0" y="90" font-family="'Playfair Display', serif" font-size="80" font-weight="900" fill="#FFD700" text-anchor="middle" letter-spacing="-2">
      WACHA TU
    </text>
  </g>
  
  <!-- Tagline "Oh well...." -->
  <text x="250" y="295" font-family="'Inter', sans-serif" font-size="20" fill="white" text-anchor="middle" font-style="italic" letter-spacing="1">
    Oh well....
  </text>
  
  <!-- PODCAST label -->
  <text x="250" y="330" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#FFD700" text-anchor="middle" letter-spacing="3">
    · PODCAST ·
  </text>
  
  <!-- Audio Waveform -->
  <g transform="translate(250, 345)" stroke="#FFD700" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="-40" y1="0" x2="-40" y2="-4"/>
    <line x1="-30" y1="0" x2="-30" y2="-8"/>
    <line x1="-20" y1="0" x2="-20" y2="-10"/>
    <line x1="-10" y1="0" x2="-10" y2="-8"/>
    <line x1="0" y1="0" x2="0" y2="-12"/>
    <line x1="10" y1="0" x2="10" y2="-8"/>
    <line x1="20" y1="0" x2="20" y2="-10"/>
    <line x1="30" y1="0" x2="30" y2="-8"/>
    <line x1="40" y1="0" x2="40" y2="-4"/>
  </g>
  
  <!-- Bottom Text - Curved -->
  <defs>
    <path id="bottomCurve" d="M 80,250 A 170,170 0 0,1 420,250" fill="none"/>
  </defs>
  <text font-family="'Inter', sans-serif" font-size="11" fill="#FFD700" font-weight="600" letter-spacing="2">
    <textPath href="#bottomCurve" startOffset="50%" text-anchor="middle">
      REAL CONVERSATIONS · REAL PEOPLE · REAL STORIES
    </textPath>
  </text>
  
  <!-- Small microphone icon at bottom -->
  <g transform="translate(250, 425)">
    <circle cx="0" cy="0" r="6" fill="#FFD700"/>
    <path d="M -2 2 L 2 2" stroke="#000000" stroke-width="1"/>
  </g>
</svg>